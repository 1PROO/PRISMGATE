<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PrismGate TV Player</title>
  <meta name="description" content="IPTV Web Player - Watch live channels from your browser on any Smart TV">
  <meta name="theme-color" content="#0d0b14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════ LOGIN SCREEN ═══════ -->
  <div id="login-screen" class="screen active">
    <div class="login-bg">
      <div class="login-card">
        <div class="login-logo">
          <i class="bi bi-tv"></i>
          <h1>PrismGate <span>TV</span></h1>
          <p>IPTV Web Player</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="server-url"><i class="bi bi-hdd-network"></i> Server</label>
            <input type="text" id="server-url" placeholder="http://gate.codro.me" value="http://gate.codro.me" tabindex="1" autofocus>
          </div>
          <div class="form-group">
            <label for="username"><i class="bi bi-person"></i> Username</label>
            <input type="text" id="username" placeholder="Username" tabindex="2">
          </div>
          <div class="form-group">
            <label for="password"><i class="bi bi-key"></i> Password</label>
            <input type="password" id="password" placeholder="Password" tabindex="3">
          </div>
          <button type="submit" class="btn-login" tabindex="4">
            <i class="bi bi-box-arrow-in-right"></i> Connect
          </button>
          <p id="login-error" class="error-msg"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- ═══════ MAIN TV INTERFACE ═══════ -->
  <div id="main-screen" class="screen">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <i class="bi bi-tv"></i>
        <span class="brand">PrismGate <strong>TV</strong></span>
      </div>
      <div class="topbar-center" id="now-playing">
        <span class="now-label">Ready</span>
      </div>
      <div class="topbar-right">
        <span id="clock"></span>
        <button class="btn-icon" id="btn-logout" tabindex="900" title="Logout">
          <i class="bi bi-power"></i>
        </button>
      </div>
    </div>

    <!-- Content Area: Sidebar + Channel List + Player -->
    <div class="content-area">
      <!-- Category Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <i class="bi bi-grid-3x3-gap"></i> Categories
        </div>
        <div class="sidebar-list" id="category-list">
          <!-- Categories populated by JS -->
        </div>
      </div>

      <!-- Channel List -->
      <div class="channel-panel" id="channel-panel">
        <div class="channel-header">
          <span id="category-title">All Channels</span>
          <span id="channel-count" class="channel-count"></span>
        </div>
        <div class="channel-list" id="channel-list">
          <!-- Channels populated by JS -->
        </div>
      </div>

      <!-- Video Player -->
      <div class="player-panel" id="player-panel">
        <div class="player-wrapper" id="player-wrapper">
          <video id="video-player" autoplay controls></video>
          <div class="player-overlay" id="player-overlay">
            <div class="player-info">
              <i class="bi bi-tv"></i>
              <p>Select a channel to start watching</p>
            </div>
          </div>
          <div class="player-loading" id="player-loading" style="display:none">
            <div class="spinner"></div>
            <p>Loading stream...</p>
          </div>
          <div class="player-error" id="player-error" style="display:none">
            <i class="bi bi-exclamation-triangle"></i>
            <p id="player-error-msg">Stream unavailable</p>
            <button class="btn-retry" id="btn-retry">Retry</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Fullscreen Player -->
    <div class="fullscreen-player" id="fullscreen-player" style="display:none">
      <video id="fs-video-player" autoplay></video>
      <div class="fs-overlay" id="fs-overlay">
        <div class="fs-topbar">
          <button class="btn-icon fs-back" id="fs-back"><i class="bi bi-arrow-right"></i> Back</button>
          <span class="fs-title" id="fs-title">Channel Name</span>
          <span class="fs-clock" id="fs-clock"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="spinner big"></div>
    <p>Loading channels...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
